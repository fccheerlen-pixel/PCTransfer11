name: Build PCTransfer11

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PCTransfer11.sln

      - name: Build (Release)
        run: dotnet build PCTransfer11.sln -c Release --no-restore

      - name: Publish (self-contained .exe, portable)
        run: dotnet publish PCTransfer11/PCTransfer11.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

      - name: Portable-versie inpakken als zip
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath PCTransfer11-portable.zip

      - name: Upload portable build-artefact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: PCTransfer11-portable
          path: PCTransfer11-portable.zip

      - name: Upload portable build-artefact (map)
        uses: actions/upload-artifact@v4
        with:
          name: PCTransfer11-windows
          path: publish/

      - name: Inno Setup installeren
        run: choco install innosetup -y --no-progress
        shell: pwsh

      - name: Installer bouwen (setup.exe)
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss'

      - name: Upload installer-artefact (setup.exe)
        uses: actions/upload-artifact@v4
        with:
          name: PCTransfer11-installer
          path: installer/Output/PCTransfer11-Setup.exe
