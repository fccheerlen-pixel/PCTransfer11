name: Build PCTransfer11

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PCTransfer11.sln

      - name: Build (Release)
        run: dotnet build PCTransfer11.sln -c Release --no-restore

      - name: Publish (self-contained .exe)
        run: dotnet publish PCTransfer11/PCTransfer11.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

      - name: Upload build-artefact
        uses: actions/upload-artifact@v4
        with:
          name: PCTransfer11-windows
          path: publish/
